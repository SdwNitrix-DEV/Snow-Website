<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snow-BOT | Commands</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; }
        .container { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 30px; display: inline-block; max-width: 600px; }
        h1 { color: #58a6ff; }
        .command-list { text-align: left; line-height: 1.8; }
        code { background: #21262d; padding: 2px 5px; border-radius: 5px; color: #ffa657; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ Snow-BOT Commands</h1>
        <div class="command-list">
            <p><code>!play [song]</code> - Plays music from YouTube</p>
            <p><code>!help</code> - Shows the bot menu</p>
            <p><code>!clear [num]</code> - Deletes messages (Staff)</p>
            <p><code>!poll "quest"</code> - Creates a vote</p>
        </div>
    </div>
</body>
</html>
